{% set name = "mcp-compose" %}
{% set version = "0.1.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/datalayer/{{ name }}/archive/refs/tags/v{{ version }}.zip
  sha256: 0efd6ca976b563dd28a85aaaffeb96bb6b4881f4ca528975ee629e20316423bf

build:
  skip: True  # [py<310]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - python
    - pip
    - hatchling >=1.21
  run:
    - python
    - cryptography >=41.0.0
    - fastapi >=0.104.0
    - httpx >=0.25.0
    - importlib-metadata >=4.8.0
    - mcp >=1.2.1
    - prometheus_client
    - psutil >=5.9.0
    - pyjwt >=2.8.0
    - pydantic >=2
    - python-dotenv >=1.0.0
    - sse-starlette >=1.8.0
    - toml >=0.10.2
    - tomli >=2.0.0
    - typing-extensions >=4
    - uvicorn >=0.24.0

test:
  imports:
    - mcp_compose
  commands:
    - mcp-compose --help
    - pip check
  requires:
    - pip

about:
  home: https://github.com/datalayer/mcp-compose
  summary: 'Composition server for the Model Context Protocol (MCP).'
  description: |
    A powerful, production-ready framework for composing and orchestrating Model
    Context Protocol (MCP) servers with advanced management capabilities, REST API,
    and modern Web UI.  # Remember to specify the license variants for BSD, Apache,
    GPL, and LGPL.
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://github.com/datalayer/mcp-compose
  dev_url: https://github.com/datalayer/mcp-compose

extra:
  recipe-maintainers:
    - datalayer
    - echarles
    - eleonorecharles
    - goanpeca
